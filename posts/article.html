<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="/assets/profile.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title>
    <!-- Include marked.js with full GFM support -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <!-- Add KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <!-- Add KaTeX JS -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- Add auto-render extension for KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- Add GitHub-like CSS for Markdown -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sindresorhus/github-markdown-css@4.0.0/github-markdown.min.css">
    <!-- Add Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <!-- Add Prism CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <!-- Optional: Choose a different theme like prism-okaidia or prism-tomorrow -->
    <!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" /> -->
    <style>
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            text-align: justify;
        }
        .markdown-body .math-display {
            text-align: center;
            margin: 1em 0;
        }
        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }
        .error-message {
            color: #d73a49;
            background-color: #ffeef0;
            border: 1px solid #f97583;
            border-radius: 6px;
            padding: 16px;
            margin: 20px 0;
        }
        .loading-message {
            color: #586069;
            text-align: center;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content" class="markdown-body">
            <div class="loading-message">Loading article...</div>
        </div>
    </div>

    <!-- Add Prism.js before the markdown loading script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <script>
        // Initialize mermaid
        mermaid.initialize({ startOnLoad: false });

        // Configure marked with full GFM support
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: true,
            mangle: false,
            pedantic: false,
            smartLists: true,
            smartypants: true,
            xhtml: true
        });

        // Create marked instance with custom renderer
        const renderer = new marked.Renderer();
        
        // Modify the renderer.code function
        renderer.code = function(code, language) {
            if (language === 'mermaid') {
                return `<div class="mermaid">${code}</div>`;
            }
            // Ensure the language class is properly set for Prism
            const validLanguage = language || 'plaintext';
            const escapedCode = code.replace(/&/g, '&amp;')
                                   .replace(/</g, '&lt;')
                                   .replace(/>/g, '&gt;');
            return `<pre><code class="language-${validLanguage}">${escapedCode}</code></pre>`;
        };
        
        marked.use({ renderer });



        // Function to get URL parameter
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Function to extract title from markdown content
        function extractTitleFromMarkdown(text) {
            const lines = text.split('\n');
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('# ')) {
                    return line.substring(2).trim();
                }
            }
            return 'Article';
        }

        // Function to load and render Markdown file
        async function loadMarkdown(filename, fallbackTitle = 'Article') {
            try {
                const response = await fetch(`writings/${filename}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                
                // Extract title from markdown content
                const extractedTitle = extractTitleFromMarkdown(text);
                document.getElementById('page-title').textContent = extractedTitle;
                
                // Create temporary markers for LaTeX blocks
                let latexBlocks = [];
                let counter = 0;
                
                // Pre-process LaTeX blocks
                const processedText = text.replace(/\$\$([\s\S]*?)\$\$/g, (match, latex) => {
                    const placeholder = `LATEXBLOCK${counter}`;
                    latexBlocks.push({ placeholder, latex: match });
                    counter++;
                    return placeholder;
                });
                
                // Parse markdown using marked
                let content = marked.parse(processedText);
                
                // Restore LaTeX blocks wrapped in a centered div so they
                // break out of any <p> that marked may have placed them in.
                latexBlocks.forEach(({placeholder, latex}) => {
                    content = content.replace(placeholder, `<div class="math-display">${latex}</div>`);
                });
                
                document.getElementById('content').innerHTML = content;
                
                // Highlight all code blocks
                Prism.highlightAll();
                
                // Run your existing post-processing
                await mermaid.run();
                renderMathInElement(document.getElementById('content'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false,
                    output: 'html',
                    trust: true,
                    strict: false,
                    macros: {
                        "\\mathbb": "\\mathbf",
                        "\\E": "\\mathbb{E}",
                    }
                });
            } catch (error) {
                console.error('Error loading Markdown:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error-message">
                        <strong>Error loading article:</strong> ${error.message}
                        <br><br>
                        Please check that the article exists and try again.
                        <br>
                        <a href="/">← Back to home</a>
                    </div>
                `;
                document.getElementById('page-title').textContent = 'Error - Article Not Found';
            }
        }

        // Main initialization
        function init() {
            // Get article parameter from URL
            const articleParam = getUrlParameter('article');
            
            if (articleParam) {
                // Try to load article directly by filename
                const filename = articleParam.endsWith('.md') ? articleParam : `${articleParam}.md`;
                loadMarkdown(filename);
            } else {
                // No article specified, show error
                document.getElementById('content').innerHTML = `
                    <div class="error-message">
                        <strong>No article specified.</strong>
                        <br><br>
                        Please specify an article using the URL parameter, for example:
                        <br>
                        <code>?article=RLHF</code> or <code>?article=Vision_Language_Models</code>
                        <br><br>
                        <a href="/">← Back to home</a>
                    </div>
                `;
                document.getElementById('page-title').textContent = 'No Article Specified';
            }
        }

        // Initialize when page loads
        init();
    </script>
</body>
</html>
