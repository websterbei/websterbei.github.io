<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLM Query Tokens</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 20px 16px;
    }
    .container { max-width: 720px; width: 100%; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
      margin-bottom: 10px;
    }
    .panel {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 16px;
    }
    .prompt {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 14px;
      color: #444;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .prompt code {
      font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
      font-size: 12px;
      background: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .token-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .token {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #d4d4d4;
      background: #f0f0f0;
      color: #444;
      font-size: 12.5px;
      font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
      font-weight: 500;
      white-space: nowrap;
    }
    .token.image {
      background: #dbeafe;
      border-color: #93c5fd;
      color: #1d4ed8;
      animation: pulse 2s ease-in-out infinite;
    }
    .callout {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #dbeafe;
      color: #1d4ed8;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.16); transform: translateY(0); }
      50% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.04); transform: translateY(-1px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section-label">Prompt with Image Placeholder</div>
    <div class="panel">
      <div class="prompt">
        Given image <code>&lt;|image_token|&gt;</code>, please describe it.
      </div>

      <div class="token-row">
        <span class="token">Given</span>
        <span class="token">image</span>
        <span class="token image">&lt;|image_token|&gt;</span>
        <span class="token">,</span>
        <span class="token">please</span>
        <span class="token">describe</span>
        <span class="token">it</span>
        <span class="token">.</span>
      </div>

      <div class="callout">
        <span class="badge">Insert Point</span>
        <span>The special image token marks exactly where the projected vision embeddings will be inserted.</span>
      </div>
    </div>
  </div>
</body>
</html>
