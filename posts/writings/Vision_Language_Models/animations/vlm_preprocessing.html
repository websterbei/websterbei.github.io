<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Preprocessing Methods</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 20px 16px;
    }
    .container { max-width: 720px; width: 100%; }

    .method-bar { display: flex; gap: 6px; margin-bottom: 14px; }
    .method-tab {
      font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 6px;
      background: #f0f0f0; color: #999;
      transition: all 0.3s;
    }
    .method-tab.active { background: #1a1a1a; color: #fff; }

    .canvas {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 28px 20px 22px;
      min-height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transform-row {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .img-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .photo {
      border-radius: 4px;
      border: 2px solid #d0d0d0;
      background:
        radial-gradient(circle at 76% 28%, #FFD700 0%, #FFD700 12px, transparent 12.5px),
        linear-gradient(180deg, #4a90d9 0%, #87CEEB 36%, #6db36d 49%, #3a7a3a 63%, #8B7355 76%, #6d5740 100%);
    }

    .dim {
      font-family: "SF Mono", "Fira Code", Menlo, monospace;
      font-size: 11px; color: #999;
    }
    .arrow-sym { font-size: 22px; color: #ccc; flex-shrink: 0; }

    .result {
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .result.show { opacity: 1; transform: translateY(0); }

    .pad-frame {
      background: #222;
      border-radius: 4px;
      border: 2px solid #d0d0d0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pad-frame .photo-inner {
      border-radius: 2px;
      background:
        radial-gradient(circle at 76% 28%, #FFD700 0%, #FFD700 6px, transparent 6.5px),
        linear-gradient(180deg, #4a90d9 0%, #87CEEB 36%, #6db36d 49%, #3a7a3a 63%, #8B7355 76%, #6d5740 100%);
    }

    .tiles-row { display: flex; gap: 10px; }
    .tile {
      border-radius: 3px;
      border: 2px solid #d0d0d0;
    }

    .info-bar {
      margin-top: 12px;
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 10px 16px;
      min-height: 38px;
      font-size: 13px; color: #666;
      display: flex;
      align-items: center; gap: 8px;
    }
    .note-warn { color: #d97706; font-weight: 600; }
    .note-ok   { color: #16a34a; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="method-bar">
      <div class="method-tab" id="tab0">1. Simple Resize</div>
      <div class="method-tab" id="tab1">2. Pad & Resize</div>
      <div class="method-tab" id="tab2">3. Scanning</div>
    </div>
    <div class="canvas" id="canvas"></div>
    <div class="info-bar" id="info">
      <span style="color:#bbb; font-style:italic">Comparing image preprocessing approaches…</span>
    </div>
  </div>

  <script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const tabs = [document.getElementById('tab0'), document.getElementById('tab1'), document.getElementById('tab2')];
    const canvas = document.getElementById('canvas');
    const info = document.getElementById('info');

    function setTab(i) { tabs.forEach((t, j) => t.classList.toggle('active', j === i)); }

    async function simpleResize() {
      setTab(0);
      canvas.innerHTML = `
        <div class="transform-row">
          <div class="img-col">
            <div class="photo" style="width:240px;height:120px"></div>
            <span class="dim">800 × 400</span>
          </div>
          <span class="arrow-sym">→</span>
          <div class="img-col result" id="res">
            <div class="photo" style="width:130px;height:130px"></div>
            <span class="dim">336 × 336</span>
          </div>
        </div>`;
      info.innerHTML = '<span style="color:#bbb;font-style:italic">Directly resize to target dimensions…</span>';
      await sleep(900);
      document.getElementById('res').classList.add('show');
      await sleep(500);
      info.innerHTML = '<span class="note-warn">⚠ Aspect ratio distorted</span> — the sun becomes oval, landscape vertically stretched';
      await sleep(3500);
    }

    async function padResize() {
      setTab(1);
      canvas.innerHTML = `
        <div class="transform-row">
          <div class="img-col">
            <div class="photo" style="width:240px;height:120px"></div>
            <span class="dim">800 × 400</span>
          </div>
          <span class="arrow-sym">→</span>
          <div class="img-col result" id="res">
            <div class="pad-frame" style="width:130px;height:130px">
              <div class="photo-inner" style="width:124px;height:62px"></div>
            </div>
            <span class="dim">336 × 336</span>
          </div>
        </div>`;
      info.innerHTML = '<span style="color:#bbb;font-style:italic">Pad to square, then resize…</span>';
      await sleep(900);
      document.getElementById('res').classList.add('show');
      await sleep(500);
      info.innerHTML = '<span class="note-ok">✓ Aspect ratio preserved</span> — dark padding fills extra space, no distortion';
      await sleep(3500);
    }

    async function scanning() {
      setTab(2);
      const grad = `linear-gradient(180deg,#4a90d9 0%,#87CEEB 36%,#6db36d 49%,#3a7a3a 63%,#8B7355 76%,#6d5740 100%)`;
      canvas.innerHTML = `
        <div class="transform-row">
          <div class="img-col">
            <div class="photo" style="width:240px;height:120px"></div>
            <span class="dim">1024 × 512</span>
          </div>
          <span class="arrow-sym">→</span>
          <div class="img-col result" id="res">
            <div class="tiles-row">
              <div class="tile" style="width:110px;height:110px;
                background:radial-gradient(circle at 52% 28%,#FFD700 0%,#FFD700 10px,transparent 10.5px),${grad}"></div>
              <div class="tile" style="width:110px;height:110px;background:${grad}"></div>
            </div>
            <span class="dim">2 × (336 × 336) tiles</span>
          </div>
        </div>`;
      info.innerHTML = '<span style="color:#bbb;font-style:italic">Resize to grid multiple, then split into tiles…</span>';
      await sleep(900);
      document.getElementById('res').classList.add('show');
      await sleep(500);
      info.innerHTML = '<span class="note-ok">✓ Detail preserved</span> — each tile passes through the vision encoder separately';
      await sleep(3500);
    }

    async function run() {
      while (true) { await simpleResize(); await padResize(); await scanning(); }
    }
    run();
  </script>
</body>
</html>
