<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webster Bei Yijie</title>
    <link rel="icon" type="image/jpeg" href="/assets/profile.jpg">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .header-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        nav {
            margin: 30px 0;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-item {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .post-item:hover {
            background-color: #f8f9fa;
        }
        .post-link {
            font-size: 1.2em;
            font-weight: 500;
            display: block;
        }
        .post-date {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="/assets/profile.jpg" alt="Webster Bei Yijie" class="profile-pic">
        <h1>Webster Bei Yijie</h1>
    </div>
    <nav>
        <ul id="post-list" class="post-list">
            <!-- Posts will be dynamically loaded here -->
        </ul>
    </nav>

    <script>
        // Article configuration with metadata
        const articleConfig = {
            'RLHF/RLHF.md': {
                title: 'So Many RLHF Algorithms',
                date: '2025-01-21',
                slug: 'RLHF'
            },
            'Speculative_Decoding/Speculative_Decoding.md': {
                title: 'Speculative Decoding: What it is, Why it Matters, and the Major Variants',
                date: '2026-03-03',
                slug: 'Speculative_Decoding'
            },
            'Vision_Language_Models/Vision_Language_Models.md': {
                title: 'Hitchhiker\'s Guide to Vision Language Models', 
                date: '2025-02-18',
                slug: 'Vision_Language_Models'
            },
        };



        // Function to format date for display
        function formatDate(dateStr) {
            if (!dateStr) return 'Date not specified';
            
            try {
                // Parse date as local time to avoid timezone issues
                const [year, month, day] = dateStr.split('-').map(Number);
                const date = new Date(year, month - 1, day); // month is 0-indexed
                
                if (isNaN(date.getTime())) {
                    return dateStr; // Return original if can't parse
                }
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            } catch (e) {
                return dateStr;
            }
        }

        // Function to get article slug from filename
        function getSlug(filename) {
            const base = filename.split('/').pop() || filename;
            return base.replace('.md', '');
        }

        // Function to load articles from configuration
        function loadArticles() {
            const postList = document.getElementById('post-list');
            const articles = [];

            // Load each configured article
            for (const [filename, config] of Object.entries(articleConfig)) {
                articles.push({
                    filename: filename,
                    slug: config.slug || getSlug(filename),
                    title: config.title,
                    date: config.date,
                    sortDate: new Date(config.date || '1970-01-01')
                });
            }

            // Sort articles by date (newest first)
            articles.sort((a, b) => b.sortDate - a.sortDate);

            // Generate HTML for articles
            if (articles.length === 0) {
                postList.innerHTML = '<li class="post-item">No articles found.</li>';
                return;
            }

            postList.innerHTML = articles.map(article => `
                <li class="post-item">
                    <a href="/posts/article.html?article=${article.slug}" class="post-link">${article.title}</a>
                    <div class="post-date">Posted on ${formatDate(article.date)}</div>
                </li>
            `).join('');
        }

        // Load articles when page loads
        loadArticles();
    </script>
</body>
</html>
